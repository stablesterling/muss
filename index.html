<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>✦ VOFO — Music Experience</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.03);
            --bg-glass: rgba(255,255,255,0.05);
            --text-primary: #f0ece4;
            --text-secondary: rgba(240,236,228,0.6);
            --text-muted: rgba(240,236,228,0.35);
            --border-color: rgba(255,255,255,0.06);
            --gold: #d4af37;
            --gold-light: #f0d080;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f0d080 30%, #d4af37 60%, #b8942e 100%);
            --gold-glow: 0 0 40px rgba(212,175,55,0.15);
            --bg-gradient: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.06) 0%, transparent 60%),
                            radial-gradient(ellipse at 80% 50%, rgba(212,175,55,0.03) 0%, transparent 50%),
                            var(--bg-primary);
            --shadow-sm: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 40px rgba(0,0,0,0.6);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.8);
            --shadow-gold: 0 8px 40px rgba(212,175,55,0.12);
            --transition-smooth: cubic-bezier(0.4,0,0.2,1);
            --transition-bounce: cubic-bezier(0.34,1.56,0.64,1);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            --touch-target: 44px;
        }

        [data-theme="light"] {
            --bg-primary: #f5f2ed;
            --bg-secondary: #ffffff;
            --bg-card: rgba(0,0,0,0.02);
            --bg-glass: rgba(255,255,255,0.7);
            --text-primary: #1a1814;
            --text-secondary: rgba(26,24,20,0.6);
            --text-muted: rgba(26,24,20,0.35);
            --border-color: rgba(0,0,0,0.06);
            --bg-gradient: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.08) 0%, transparent 60%),
                            var(--bg-primary);
            --shadow-sm: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 40px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.1);
            --shadow-gold: 0 8px 40px rgba(212,175,55,0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:var(--radius-full); }
        html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:var(--font-body);
            background:var(--bg-gradient);
            color:var(--text-primary);
            min-height:100vh;
            min-height:100dvh;
            transition:background 0.6s var(--transition-smooth), color 0.6s var(--transition-smooth);
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            overflow-x:hidden;
        }

        .container { 
            max-width:1280px; 
            margin:0 auto; 
            padding:16px 16px 80px; 
            position:relative; 
            z-index:1; 
        }

        .bg-particles {
            position:fixed; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:0; overflow:hidden;
        }
        .particle {
            position:absolute; width:3px; height:3px; background:var(--gold);
            border-radius:50%; opacity:0;
            animation:floatParticle 20s infinite linear;
        }
        @keyframes floatParticle {
            0% { opacity:0; transform:translateY(100vh) scale(0); }
            10% { opacity:0.2; }
            90% { opacity:0.2; }
            100% { opacity:0; transform:translateY(-100vh) scale(1); }
        }
        @media (max-width:480px) { .particle { width:2px; height:2px; } }

        /* Header */
        header {
            display:flex; 
            flex-direction:column;
            align-items:center; 
            padding:12px 0 20px; 
            gap:12px;
            border-bottom:1px solid var(--border-color);
            animation:fadeDown 0.8s var(--transition-smooth);
        }
        @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        .brand { 
            display:flex; 
            align-items:center; 
            gap:10px; 
            width:100%;
            justify-content:center;
        }
        .brand-icon { 
            font-size:28px; 
            animation:pulseGold 3s ease-in-out infinite; 
            flex-shrink:0;
        }
        @keyframes pulseGold {
            0%,100% { filter:drop-shadow(0 0 15px rgba(212,175,55,0.15)); }
            50% { filter:drop-shadow(0 0 30px rgba(212,175,55,0.3)); }
        }
        .brand h1 {
            font-family:var(--font-display); 
            font-size:1.8rem; 
            font-weight:700;
            background:var(--gold-gradient); 
            -webkit-background-clip:text; 
            -webkit-text-fill-color:transparent;
            background-clip:text; 
            letter-spacing:0.05em;
            line-height:1.2;
        }
        .brand .subtitle { 
            font-size:0.7rem; 
            color:var(--text-secondary); 
            font-weight:300; 
            letter-spacing:0.2em; 
            text-transform:uppercase;
            display:block;
            margin-top:-2px;
        }
        .header-actions { 
            display:flex; 
            align-items:center; 
            gap:8px; 
            flex-wrap:wrap; 
            justify-content:center;
            width:100%;
        }

        /* Buttons */
        .btn {
            padding:10px 20px; 
            border:none; 
            border-radius:var(--radius-full); 
            cursor:pointer;
            transition:all 0.3s var(--transition-bounce);
            font-family:var(--font-body); 
            font-weight:500; 
            font-size:0.8rem; 
            letter-spacing:0.02em;
            background:transparent; 
            color:var(--text-primary);
            border:1px solid var(--border-color); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            min-height:var(--touch-target);
            min-width:var(--touch-target);
            touch-action:manipulation;
            user-select:none;
        }
        .btn-primary {
            background:var(--gold-gradient); 
            color:#0a0a0f; 
            border:none; 
            font-weight:600; 
            box-shadow:var(--shadow-gold);
        }
        .btn-primary:active { transform:scale(0.95); }
        .btn-outline { background:var(--bg-glass); border:1px solid var(--border-color); }
        .btn-outline:active { transform:scale(0.95); }
        .btn-ghost { border:none; background:transparent; padding:8px 14px; }
        .btn-ghost:active { transform:scale(0.92); }
        .btn-icon { 
            width:var(--touch-target); 
            height:var(--touch-target); 
            padding:0; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            border-radius:var(--radius-full); 
            font-size:18px; 
            min-height:var(--touch-target);
            min-width:var(--touch-target);
        }
        .btn-danger { border-color:rgba(255,107,107,0.3); color:#ff6b6b; }
        .btn-danger:active { transform:scale(0.95); }

        @media (hover:hover) {
            .btn-primary:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 8px 40px rgba(212,175,55,0.25); }
            .btn-outline:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:var(--shadow-gold); }
            .btn-ghost:hover { background:var(--bg-card); transform:translateY(-1px); }
            .btn-danger:hover { background:rgba(255,107,107,0.1); border-color:#ff6b6b; }
        }

        /* Modal */
        .modal {
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%;
            background:rgba(0,0,0,0.7); 
            backdrop-filter:blur(20px); 
            -webkit-backdrop-filter:blur(20px);
            z-index:1000; 
            justify-content:center; 
            align-items:center;
            padding:16px;
            animation:fadeIn 0.3s var(--transition-smooth);
        }
        .modal.active { display:flex; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .modal-content {
            background:var(--bg-secondary); 
            padding:32px 24px 28px; 
            border-radius:var(--radius-lg);
            max-width:420px; 
            width:100%; 
            position:relative; 
            border:1px solid var(--border-color);
            box-shadow:var(--shadow-lg); 
            animation:modalSlide 0.4s var(--transition-bounce);
            max-height:90vh;
            overflow-y:auto;
        }
        @keyframes modalSlide { from { opacity:0; transform:translateY(20px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
        .modal-content::before {
            content:''; 
            position:absolute; 
            top:-1px; 
            left:-1px; 
            right:-1px; 
            height:2px;
            background:var(--gold-gradient); 
            border-radius:var(--radius-lg) var(--radius-lg) 0 0;
        }
        .modal-close {
            position:absolute; 
            top:12px; 
            right:16px; 
            font-size:24px; 
            cursor:pointer;
            color:var(--text-secondary); 
            background:none; 
            border:none;
            transition:all 0.3s var(--transition-smooth); 
            font-family:var(--font-body);
            min-height:44px;
            min-width:44px;
        }
        .modal-close:active { transform:rotate(90deg); }
        .modal h2 { 
            font-family:var(--font-display); 
            font-size:1.6rem; 
            margin-bottom:6px; 
            text-align:center; 
            font-weight:600; 
        }
        .modal .subtitle { text-align:center; color:var(--text-secondary); font-size:0.85rem; margin-bottom:24px; }
        .form-group { margin-bottom:16px; }
        .form-group label { 
            display:block; 
            margin-bottom:4px; 
            color:var(--text-secondary); 
            font-size:0.75rem; 
            font-weight:500; 
            letter-spacing:0.05em; 
            text-transform:uppercase; 
        }
        .form-group input {
            width:100%; 
            padding:14px 16px; 
            border:1.5px solid var(--border-color); 
            border-radius:var(--radius-md);
            background:var(--bg-primary); 
            color:var(--text-primary); 
            font-size:1rem;
            transition:all 0.3s var(--transition-smooth); 
            font-family:var(--font-body);
            min-height:var(--touch-target);
            -webkit-appearance:none;
        }
        .form-group input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 4px rgba(212,175,55,0.08); }
        .form-error { color:#ff6b6b; font-size:0.8rem; margin-top:6px; text-align:center; }
        .form-switch { text-align:center; margin-top:16px; color:var(--text-secondary); font-size:0.85rem; }
        .form-switch a { color:var(--gold); cursor:pointer; font-weight:600; }
        .modal .btn-primary { 
            width:100%; 
            padding:14px; 
            font-size:1rem; 
            margin-top:4px; 
            min-height:var(--touch-target);
        }

        /* Search */
        .search-section {
            display:flex; 
            flex-direction:column;
            gap:10px; 
            max-width:700px; 
            margin:20px auto 20px;
            animation:fadeDown 0.8s var(--transition-smooth) 0.2s both;
        }
        .search-wrapper { flex:1; position:relative; width:100%; }
        .search-wrapper .search-icon {
            position:absolute; 
            left:16px; 
            top:50%; 
            transform:translateY(-50%);
            color:var(--text-muted); 
            font-size:16px; 
            pointer-events:none;
        }
        #searchInput {
            width:100%; 
            padding:14px 16px 14px 44px;
            border:1.5px solid var(--border-color); 
            border-radius:var(--radius-full);
            background:var(--bg-glass); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            color:var(--text-primary); 
            font-size:1rem;
            transition:all 0.4s var(--transition-smooth); 
            font-family:var(--font-body);
            min-height:var(--touch-target);
            -webkit-appearance:none;
        }
        #searchInput:focus { 
            outline:none; 
            border-color:var(--gold); 
            box-shadow:0 0 0 4px rgba(212,175,55,0.06), var(--shadow-gold); 
        }
        #searchInput::placeholder { color:var(--text-muted); font-weight:300; font-size:0.9rem; }
        #searchBtn { 
            padding:14px 24px; 
            white-space:nowrap; 
            width:100%;
            min-height:var(--touch-target);
        }

        /* Tabs */
        .tabs {
            display:flex; 
            gap:4px; 
            margin:6px 0 16px; 
            flex-wrap:nowrap;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
            animation:fadeDown 0.8s var(--transition-smooth) 0.3s both;
            background:var(--bg-card); 
            border-radius:var(--radius-full); 
            padding:4px;
            border:1px solid var(--border-color); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            scrollbar-width:none;
            -ms-overflow-style:none;
        }
        .tabs::-webkit-scrollbar { display:none; }
        .tab {
            padding:8px 16px; 
            border-radius:var(--radius-full); 
            cursor:pointer;
            transition:all 0.3s var(--transition-bounce); 
            border:none;
            background:transparent; 
            color:var(--text-secondary);
            font-family:var(--font-body); 
            font-size:0.75rem; 
            font-weight:500; 
            letter-spacing:0.02em;
            white-space:nowrap;
            min-height:var(--touch-target);
            touch-action:manipulation;
            user-select:none;
            flex-shrink:0;
        }
        .tab:active { transform:scale(0.92); }
        .tab.active { 
            background:var(--gold-gradient); 
            color:#0a0a0f; 
            box-shadow:var(--shadow-gold); 
        }

        /* Results */
        .results-grid {
            display:grid; 
            grid-template-columns:repeat(2, 1fr);
            gap:12px; 
            padding:4px 0 20px; 
            animation:fadeUp 0.6s var(--transition-smooth);
        }
        .video-card {
            background:var(--bg-card); 
            border-radius:var(--radius-md); 
            overflow:hidden; 
            cursor:pointer;
            transition:all 0.4s var(--transition-bounce);
            border:1px solid var(--border-color); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            position:relative; 
            animation:fadeUp 0.6s var(--transition-smooth);
            touch-action:manipulation;
        }
        .video-card:active { transform:scale(0.96); }
        .video-card .thumbnail { position:relative; overflow:hidden; aspect-ratio:16/9; }
        .video-card .thumbnail img { 
            width:100%; 
            height:100%; 
            object-fit:cover; 
            transition:transform 0.4s var(--transition-smooth);
        }
        .video-card .thumbnail .overlay {
            position:absolute; 
            top:0; left:0; right:0; bottom:0;
            background:linear-gradient(0deg, rgba(0,0,0,0.3) 0%, transparent 50%);
            opacity:0; 
            transition:opacity 0.3s var(--transition-smooth);
            display:flex; 
            align-items:center; 
            justify-content:center;
        }
        .video-card:active .thumbnail .overlay { opacity:1; }
        .video-card .thumbnail .overlay .play-circle {
            width:48px; 
            height:48px; 
            border-radius:50%; 
            background:rgba(212,175,55,0.9);
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-size:22px; 
            color:#0a0a0f;
            transform:scale(0.8); 
            transition:transform 0.3s var(--transition-bounce);
        }
        .video-card:active .thumbnail .overlay .play-circle { transform:scale(1); }
        .video-card .info { padding:10px 12px 8px; }
        .video-card .info h3 {
            font-size:0.8rem; 
            font-weight:500; 
            margin-bottom:2px;
            display:-webkit-box; 
            -webkit-line-clamp:2; 
            -webkit-box-orient:vertical; 
            overflow:hidden;
            line-height:1.3; 
            font-family:var(--font-display);
        }
        .video-card .info .channel { 
            color:var(--text-secondary); 
            font-size:0.7rem; 
            display:block;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .video-card .actions {
            padding:8px 12px 12px; 
            display:flex; 
            gap:4px; 
            flex-wrap:wrap;
            border-top:1px solid var(--border-color);
        }
        .video-card .actions .btn { 
            padding:4px 10px; 
            font-size:0.65rem; 
            min-height:30px;
            flex:1;
            min-width:0;
            text-align:center;
        }
        .video-card .favorite-btn {
            position:absolute; 
            top:8px; 
            right:8px;
            background:rgba(0,0,0,0.5); 
            backdrop-filter:blur(8px); 
            -webkit-backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.1); 
            color:white; 
            font-size:16px; 
            padding:6px;
            border-radius:50%; 
            cursor:pointer; 
            transition:all 0.3s var(--transition-bounce);
            width:32px; 
            height:32px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            z-index:2;
            touch-action:manipulation;
        }
        .video-card .favorite-btn:active { transform:scale(0.85); }
        .video-card .favorite-btn.active { color:#ff6b6b; border-color:#ff6b6b; background:rgba(255,107,107,0.2); }

        /* Player - NO YOUTUBE LOGO */
        .player-container {
            margin-top:16px; 
            padding:16px;
            background:var(--bg-glass); 
            backdrop-filter:blur(20px); 
            -webkit-backdrop-filter:blur(20px);
            border-radius:var(--radius-lg); 
            border:1px solid var(--border-color);
            box-shadow:var(--shadow-md); 
            animation:fadeUp 0.6s var(--transition-smooth) 0.2s both;
            transition:all 0.4s var(--transition-smooth);
        }
        #player { 
            width:100%; 
            max-width:100%; 
            margin:0 auto; 
            aspect-ratio:16/9; 
            border-radius:var(--radius-sm); 
            overflow:hidden; 
            box-shadow:var(--shadow-sm);
            background:#000;
        }
        .ytp-logo, .ytp-copy-link, .ytp-share-button, .ytp-watch-later-button {
            display:none !important;
        }
        .player-controls {
            display:flex; 
            align-items:center; 
            justify-content:center; 
            gap:12px;
            padding:12px 0 4px; 
            flex-wrap:wrap;
        }
        .player-controls .btn-icon { 
            width:var(--touch-target); 
            height:var(--touch-target); 
            font-size:18px; 
            min-height:var(--touch-target);
            min-width:var(--touch-target);
        }
        .volume-control { 
            display:flex; 
            align-items:center; 
            gap:8px; 
            flex:1;
            max-width:160px;
        }
        .volume-control input[type="range"] {
            flex:1;
            height:4px; 
            -webkit-appearance:none;
            background:var(--border-color); 
            border-radius:var(--radius-full); 
            outline:none;
            min-height:var(--touch-target);
        }
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance:none; 
            width:14px; 
            height:14px; 
            border-radius:50%;
            background:var(--gold-gradient); 
            cursor:pointer; 
            box-shadow:var(--shadow-gold);
        }
        .now-playing { 
            text-align:center; 
            padding:8px 0 2px; 
            color:var(--text-secondary); 
            transition:all 0.4s var(--transition-smooth); 
        }
        .now-playing.active { color:var(--text-primary); }
        .now-playing .now-label { 
            font-size:0.6rem; 
            text-transform:uppercase; 
            letter-spacing:0.12em; 
            color:var(--text-muted); 
        }
        .now-playing .song-title {
            font-family:var(--font-display); 
            font-size:1.1rem; 
            font-weight:600;
            background:var(--gold-gradient); 
            -webkit-background-clip:text; 
            -webkit-text-fill-color:transparent;
            background-clip:text; 
            margin:2px 0;
        }
        .now-playing .song-artist {
            color:var(--text-secondary); 
            font-size:0.8rem;
        }

        /* Toast */
        .toast {
            position:fixed; 
            top:16px; 
            left:16px;
            right:16px;
            padding:14px 20px;
            border-radius:var(--radius-md); 
            background:var(--bg-secondary);
            border:1px solid var(--border-color); 
            color:var(--text-primary);
            z-index:2000; 
            transform:translateY(-120%);
            transition:transform 0.4s var(--transition-bounce);
            backdrop-filter:blur(20px); 
            -webkit-backdrop-filter:blur(20px);
            box-shadow:var(--shadow-lg); 
            font-size:0.85rem; 
            font-weight:500;
            text-align:center;
        }
        .toast.show { transform:translateY(0); }
        .toast.success { border-left:4px solid #4caf50; }
        .toast.error { border-left:4px solid #ff6b6b; }
        .toast.info { border-left:4px solid var(--gold); }

        /* Loading / Empty */
        .loading-spinner { 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            justify-content:center; 
            padding:40px 16px; 
            gap:16px; 
            grid-column:1/-1;
        }
        .spinner-ring { 
            width:40px; 
            height:40px; 
            border:3px solid var(--border-color); 
            border-top-color:var(--gold); 
            border-radius:50%; 
            animation:spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .empty-state { 
            text-align:center; 
            padding:40px 16px; 
            color:var(--text-secondary); 
            grid-column:1/-1;
        }
        .empty-state .empty-icon { font-size:48px; margin-bottom:12px; opacity:0.5; }
        .empty-state h3 { 
            font-family:var(--font-display); 
            font-size:1.2rem; 
            margin-bottom:4px; 
            color:var(--text-primary); 
        }

        #createPlaylistSection { margin-top:12px; }
        #createPlaylistSection > div { flex-direction:column; gap:10px; max-width:100%; }
        #createPlaylistSection input { min-height:var(--touch-target); font-size:0.9rem; width:100%; }
        #createPlaylistSection .btn { width:100%; justify-content:center; }

        /* Responsive */
        @media (max-width:480px) {
            .container { padding:12px 12px 70px; }
            .brand h1 { font-size:1.5rem; }
            .brand .subtitle { font-size:0.6rem; }
            .results-grid { grid-template-columns:repeat(2, 1fr); gap:10px; }
            .video-card .info h3 { font-size:0.75rem; }
            .video-card .actions .btn { font-size:0.6rem; padding:3px 6px; }
            .video-card .favorite-btn { width:28px; height:28px; font-size:14px; top:6px; right:6px; }
            .player-container { padding:12px; }
            .now-playing .song-title { font-size:1rem; }
            .modal-content { padding:24px 16px 20px; }
            .tabs .tab { font-size:0.7rem; padding:6px 12px; }
            #searchInput { font-size:0.9rem; padding:12px 14px 12px 40px; }
            #searchBtn { font-size:0.85rem; padding:12px; }
        }

        @media (min-width:481px) and (max-width:768px) {
            .container { padding:16px 20px 70px; }
            .brand h1 { font-size:1.6rem; }
            .results-grid { grid-template-columns:repeat(2, 1fr); gap:14px; }
            .search-section { flex-direction:row; }
            #searchBtn { width:auto; }
            header { flex-direction:row; }
            .brand { width:auto; }
            .header-actions { width:auto; }
        }

        @media (min-width:769px) and (max-width:1024px) {
            .results-grid { grid-template-columns:repeat(3, 1fr); gap:18px; }
            header { flex-direction:row; }
            .header-actions { width:auto; }
            .search-section { flex-direction:row; }
            #searchBtn { width:auto; }
        }

        @media (min-width:1025px) {
            .results-grid { grid-template-columns:repeat(4, 1fr); gap:24px; }
            header { flex-direction:row; }
            .header-actions { width:auto; }
            .search-section { flex-direction:row; }
            #searchBtn { width:auto; }
            .video-card:hover { transform:translateY(-8px) scale(1.01); border-color:var(--gold); box-shadow:var(--shadow-gold), var(--shadow-md); }
            .video-card:hover .thumbnail .overlay { opacity:1; }
            .video-card:hover .thumbnail .overlay .play-circle { transform:scale(1); }
        }

        @media (min-width:1400px) {
            .results-grid { grid-template-columns:repeat(5, 1fr); gap:28px; }
        }

        @media (max-height:500px) and (orientation:landscape) {
            .container { padding:8px 16px 50px; }
            header { padding:8px 0 12px; }
            .brand h1 { font-size:1.2rem; }
            .search-section { margin:12px auto; gap:8px; }
            #searchInput { padding:10px 12px 10px 36px; font-size:0.85rem; }
            #searchBtn { padding:10px 16px; font-size:0.8rem; }
            .results-grid { gap:8px; padding:4px 0 12px; }
            .video-card .info { padding:6px 8px 4px; }
            .video-card .info h3 { font-size:0.7rem; }
            .video-card .actions { padding:4px 8px 8px; gap:3px; }
            .video-card .actions .btn { font-size:0.55rem; padding:2px 6px; min-height:24px; }
            .player-container { padding:10px; margin-top:10px; }
            #player { max-height:200px; }
            .now-playing .song-title { font-size:0.9rem; }
            .tabs .tab { font-size:0.65rem; padding:4px 10px; min-height:30px; }
        }

        @media (hover:none) {
            .video-card .thumbnail .overlay { opacity:1; background:linear-gradient(0deg, rgba(0,0,0,0.2) 0%, transparent 50%); }
            .video-card .thumbnail .overlay .play-circle { transform:scale(1); opacity:0.8; }
            .video-card:hover { transform:none; }
        }

        @media (prefers-reduced-motion:reduce) {
            * { animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
            .particle { display:none; }
        }

        .hidden { display:none !important; }
        .mt-16 { margin-top:16px; }
    </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>
<div id="toast" class="toast"></div>

<!-- Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeAuth()" aria-label="Close modal">✕</button>
        <h2 id="authTitle">Welcome Back</h2>
        <p class="subtitle" id="authSubtitle">Sign in to continue your musical journey</p>
        <form id="authForm" onsubmit="handleAuth(event)" novalidate>
            <div class="form-group">
                <label for="authUsername">Username or Email</label>
                <input type="text" id="authUsername" placeholder="Enter your username" required autocomplete="username" />
            </div>
            <div class="form-group">
                <label for="authPassword">Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" required minlength="6" autocomplete="current-password" />
            </div>
            <div id="authError" class="form-error"></div>
            <button type="submit" class="btn btn-primary" id="authSubmitBtn">
                <span id="authSubmitText">Sign In</span>
            </button>
        </form>
        <div class="form-switch">
            <span id="authSwitchText">New to VOFO?</span>
            <a onclick="switchAuth()" id="authSwitchLink" role="button">Create Account</a>
        </div>
    </div>
</div>

<!-- Main -->
<div class="container">
    <header>
        <div class="brand">
            <span class="brand-icon" aria-hidden="true">✦</span>
            <div>
                <h1>VOFO</h1>
                <span class="subtitle">Music Experience</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost btn-icon" onclick="toggleTheme()" title="Toggle Theme" aria-label="Toggle theme">🌓</button>
            <span id="userInfo" class="hidden" style="display:none;align-items:center;gap:8px;">
                <span id="usernameDisplay" style="color:var(--gold);font-weight:500;font-size:0.85rem;"></span>
                <button class="btn btn-ghost" onclick="logout()" style="font-size:0.7rem;color:var(--text-secondary);" aria-label="Logout">Logout</button>
            </span>
            <button id="authBtn" class="btn btn-primary" onclick="openAuth()">Sign In</button>
        </div>
    </header>

    <div class="search-section">
        <div class="search-wrapper">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="text" id="searchInput" placeholder="Search songs, artists, moods..." autofocus aria-label="Search for music" />
        </div>
        <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>

    <div class="tabs" role="tablist">
        <button class="tab active" data-tab="search" onclick="switchTab('search')" role="tab" aria-selected="true">⟡ Discover</button>
        <button class="tab" data-tab="trending" onclick="switchTab('trending')" role="tab" aria-selected="false">🔥 Trending</button>
        <button class="tab" data-tab="favorites" onclick="switchTab('favorites')" role="tab" aria-selected="false">♥ Favorites</button>
        <button class="tab" data-tab="playlists" onclick="switchTab('playlists')" role="tab" aria-selected="false">⊞ Playlists</button>
    </div>

    <div id="resultsContainer">
        <div id="results" class="results-grid"></div>
    </div>

    <div id="createPlaylistSection" class="hidden mt-16" style="text-align:center;">
        <div style="display:flex;gap:10px;max-width:500px;margin:0 auto;flex-wrap:wrap;justify-content:center;">
            <input type="text" id="playlistNameInput" placeholder="Name your new playlist..." 
                   style="flex:1;padding:12px 16px;border-radius:var(--radius-full);border:1.5px solid var(--border-color);background:var(--bg-glass);color:var(--text-primary);font-family:var(--font-body);min-width:150px;min-height:var(--touch-target);font-size:0.9rem;" />
            <button class="btn btn-primary" onclick="createPlaylist()">+ Create</button>
        </div>
    </div>

    <div id="playerContainer" class="player-container">
        <div id="player"></div>
        <div class="now-playing" id="nowPlaying">
            <span class="now-label">Now Playing</span>
            <p style="color:var(--text-muted);font-size:0.8rem;margin-top:2px;">Select a song to begin</p>
        </div>
        <div class="player-controls">
            <button class="btn btn-ghost btn-icon" onclick="togglePlay()" id="playPauseBtn" aria-label="Play/Pause">▶</button>
            <div class="volume-control">
                <span style="font-size:14px;color:var(--text-secondary);" aria-hidden="true">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70" aria-label="Volume control" />
            </div>
            <button class="btn btn-ghost btn-icon" onclick="shareSong()" title="Share" aria-label="Share song">↗</button>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ============================================
// CONFIGURATION - PRODUCTION READY
// ============================================
// UPDATE THIS with your Render backend URL after deployment
const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000/api'
    : 'https://your-backend.onrender.com/api'; // ← CHANGE THIS

let token = localStorage.getItem('token');
let currentUser = null;
let currentTab = 'search';
let isPlaying = false;

// ============================================
// PARTICLES
// ============================================
(function createParticles() {
    const container = document.getElementById('particles');
    const isMobile = window.innerWidth < 768;
    const count = isMobile ? 15 : 30;
    
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = 15 + Math.random() * 25 + 's';
        p.style.animationDelay = Math.random() * 20 + 's';
        p.style.width = (isMobile ? 1 + Math.random() * 2 : 2 + Math.random() * 4) + 'px';
        p.style.height = p.style.width;
        p.style.opacity = 0.05 + Math.random() * 0.15;
        container.appendChild(p);
    }
})();

// ============================================
// TOAST
// ============================================
function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    toast.style.transform = 'translateY(0)';
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => { 
        toast.style.transform = 'translateY(-120%)'; 
    }, 3500);
}

// ============================================
// THEME
// ============================================
function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    showToast(next === 'dark' ? '🌙 Night Mode' : '☀️ Day Mode', 'info');
}
document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

// ============================================
// AUTH
// ============================================
function openAuth(mode = 'login') {
    const modal = document.getElementById('authModal');
    modal.classList.add('active');
    document.getElementById('authTitle').textContent = mode === 'login' ? 'Welcome Back' : 'Join VOFO';
    document.getElementById('authSubtitle').textContent = mode === 'login' ? 'Sign in to continue your musical journey' : 'Create your account and start exploring';
    document.getElementById('authSubmitText').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
    document.getElementById('authSwitchText').textContent = mode === 'login' ? "New to VOFO?" : "Already have an account?";
    document.getElementById('authSwitchLink').textContent = mode === 'login' ? 'Create Account' : 'Sign In';
    document.getElementById('authForm').dataset.mode = mode;
    document.getElementById('authError').textContent = '';
    document.getElementById('authUsername').value = '';
    document.getElementById('authPassword').value = '';
    setTimeout(() => {
        document.getElementById('authUsername').focus();
    }, 300);
}

function closeAuth() { 
    document.getElementById('authModal').classList.remove('active'); 
}
function switchAuth() {
    const form = document.getElementById('authForm');
    openAuth(form.dataset.mode === 'login' ? 'register' : 'login');
}

async function handleAuth(e) {
    e.preventDefault();
    const form = document.getElementById('authForm');
    const mode = form.dataset.mode;
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const errorDiv = document.getElementById('authError');

    if (!username || !password) { 
        errorDiv.textContent = 'Please fill in all fields'; 
        return; 
    }

    try {
        const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
        const body = mode === 'login' ? { username, password } : { username, email: username, password };

        const response = await fetch(`${BACKEND_URL}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'Authentication failed');

        token = data.access_token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(data.user));

        closeAuth();
        updateUI();
        showToast(`Welcome, ${data.user.username} ✦`, 'success');
        if (currentTab === 'favorites') loadFavorites();
        if (currentTab === 'playlists') loadPlaylists();
    } catch (error) {
        errorDiv.textContent = error.message;
    }
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    token = null;
    currentUser = null;
    updateUI();
    showToast('Signed out', 'info');
    document.getElementById('results').innerHTML = '';
}

function updateUI() {
    const authBtn = document.getElementById('authBtn');
    const userInfo = document.getElementById('userInfo');
    const usernameDisplay = document.getElementById('usernameDisplay');
    if (currentUser) {
        authBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        usernameDisplay.textContent = currentUser.username;
    } else {
        authBtn.style.display = 'inline-flex';
        userInfo.style.display = 'none';
    }
}

// ============================================
// YOUTUBE PLAYER - NO LOGO
// ============================================
let player = null;
let isPlayerReady = false;
let currentVideoId = null;
let volume = 70;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '100%', 
        width: '100%', 
        videoId: '',
        playerVars: { 
            modestbranding: 1,      // Removes YouTube logo
            rel: 0,                 // No related videos at end
            controls: 1,            // Show controls
            autoplay: 1, 
            fs: 0,                  // No fullscreen button
            iv_load_policy: 3,      // No annotations
            cc_load_policy: 0,      // No captions by default
            showinfo: 0,            // No video info
            branding: 0,            // No branding
            origin: window.location.origin
        },
        events: {
            onReady: () => { 
                isPlayerReady = true; 
                player.setVolume(volume); 
            },
            onStateChange: onPlayerStateChange,
            onError: () => showToast('⚠️ Unable to play this track', 'error')
        }
    });
}

function onPlayerStateChange(event) {
    const btn = document.getElementById('playPauseBtn');
    if (event.data === YT.PlayerState.PLAYING) {
        isPlaying = true;
        btn.textContent = '⏸';
        try {
            const data = player.getVideoData();
            if (data && data.title) {
                document.getElementById('nowPlaying').innerHTML = `
                    <span class="now-label">Now Playing</span>
                    <p class="song-title">${escapeHtml(data.title)}</p>
                    <p class="song-artist">${escapeHtml(data.author || 'Artist')}</p>
                `;
                document.getElementById('nowPlaying').classList.add('active');
            }
        } catch (e) {}
    } else if (event.data === YT.PlayerState.PAUSED) {
        isPlaying = false;
        btn.textContent = '▶';
    } else if (event.data === YT.PlayerState.ENDED) {
        btn.textContent = '▶';
    }
}

function togglePlay() {
    if (!player) return;
    isPlaying ? player.pauseVideo() : player.playVideo();
}

document.getElementById('volumeSlider').addEventListener('input', function() {
    volume = parseInt(this.value);
    if (player) player.setVolume(volume);
});

// ============================================
// SEARCH
// ============================================
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const resultsDiv = document.getElementById('results');

async function searchMusic(query) {
    if (!query.trim()) { 
        showToast('Enter a search query', 'error'); 
        return; 
    }
    resultsDiv.innerHTML = `<div class="loading-spinner"><div class="spinner-ring"></div><p>Curating sounds...</p></div>`;
    try {
        const response = await fetch(`${BACKEND_URL}/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (!response.ok) throw new Error('Search failed');
        if (!data || data.length === 0) {
            resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">🎵</div><h3>No results found</h3><p>Try a different search term</p></div>`;
            return;
        }
        displayResults(data);
    } catch (error) {
        resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><h3>Connection error</h3><p>${error.message}</p></div>`;
    }
}

async function loadTrending() {
    resultsDiv.innerHTML = `<div class="loading-spinner"><div class="spinner-ring"></div><p>Loading trending...</p></div>`;
    try {
        const response = await fetch(`${BACKEND_URL}/trending`);
        const data = await response.json();
        if (!data || data.length === 0) {
            resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">🔥</div><h3>No trending songs</h3><p>Check back later</p></div>`;
            return;
        }
        displayResults(data);
    } catch (error) {
        resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><h3>Connection error</h3><p>${error.message}</p></div>`;
    }
}

function displayResults(songs) {
    resultsDiv.innerHTML = songs.map((song, index) => `
        <div class="video-card" style="animation-delay:${index * 0.05}s">
            <div class="thumbnail" onclick="playVideo('${song.id}', '${escapeHtml(song.title)}', '${escapeHtml(song.artist)}')" role="button" aria-label="Play ${escapeHtml(song.title)}">
                <img src="${song.thumbnail}" alt="${escapeHtml(song.title)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22><rect width=%22320%22 height=%22180%22 fill=%22%23333%22/><text x=%22160%22 y=%2290%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22>🎵</text></svg>'" />
                <div class="overlay"><div class="play-circle" aria-hidden="true">▶</div></div>
            </div>
            <div class="info">
                <h3>${escapeHtml(song.title)}</h3>
                <span class="channel">${escapeHtml(song.artist)}</span>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="event.stopPropagation();playVideo('${song.id}','${escapeHtml(song.title)}','${escapeHtml(song.artist)}')" aria-label="Play ${escapeHtml(song.title)}">Play</button>
                <button class="btn btn-outline" onclick="event.stopPropagation();saveSong('${song.id}','${escapeHtml(song.title)}','${escapeHtml(song.artist)}','${song.thumbnail}')" aria-label="Save ${escapeHtml(song.title)}">Save</button>
                <button class="btn btn-outline" onclick="event.stopPropagation();addToPlaylist('${song.id}')" aria-label="Add to playlist">+ List</button>
                <button class="favorite-btn" onclick="event.stopPropagation();toggleFavorite('${song.id}')" id="fav_${song.id}" aria-label="Toggle favorite">♡</button>
            </div>
        </div>
    `).join('');
    if (currentUser) songs.forEach(s => checkFavorite(s.id));
}

// ============================================
// PLAY VIDEO
// ============================================
function playVideo(videoId, title, artist) {
    if (!isPlayerReady) { 
        showToast('Player is loading...', 'info'); 
        return; 
    }
    currentVideoId = videoId;
    player.loadVideoById(videoId);
    document.getElementById('nowPlaying').innerHTML = `
        <span class="now-label">Now Playing</span>
        <p class="song-title">${escapeHtml(title)}</p>
        <p class="song-artist">${escapeHtml(artist)}</p>
    `;
    document.getElementById('nowPlaying').classList.add('active');
    setTimeout(() => {
        document.getElementById('playerContainer').scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center' 
        });
    }, 300);
}

// ============================================
// SAVE SONG
// ============================================
async function saveSong(youtubeId, title, artist, thumbnail) {
    if (!currentUser) { 
        showToast('Sign in to save songs', 'error'); 
        openAuth(); 
        return; 
    }
    try {
        const response = await fetch(`${BACKEND_URL}/songs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ youtube_id: youtubeId, title, artist, thumbnail })
        });
        if (response.ok) showToast('Saved to library ✦', 'success');
    } catch (error) { showToast('Failed to save', 'error'); }
}

// ============================================
// FAVORITES
// ============================================
async function toggleFavorite(songId) {
    if (!currentUser) { 
        showToast('Sign in to favorite', 'error'); 
        openAuth(); 
        return; 
    }
    try {
        const btn = document.getElementById(`fav_${songId}`);
        const isFav = btn.classList.contains('active');
        
        const response = await fetch(`${BACKEND_URL}/favorites${isFav ? `/${songId}` : ''}`, {
            method: isFav ? 'DELETE' : 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: isFav ? null : JSON.stringify({ song_id: songId, title: 'Song', artist: 'Artist' })
        });

        if (response.ok) {
            btn.classList.toggle('active');
            btn.textContent = btn.classList.contains('active') ? '♥' : '♡';
            showToast(isFav ? 'Removed from favorites' : 'Added to favorites ♥', 'success');
            if (currentTab === 'favorites') loadFavorites();
        }
    } catch (error) { showToast('Failed to update', 'error'); }
}

async function checkFavorite(songId) {
    try {
        const response = await fetch(`${BACKEND_URL}/favorites/check/${songId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const btn = document.getElementById(`fav_${songId}`);
        if (btn && data.isFavorited) { 
            btn.classList.add('active'); 
            btn.textContent = '♥'; 
        }
    } catch (error) {}
}

async function loadFavorites() {
    if (!currentUser) { 
        showToast('Please login to see favorites', 'info'); 
        return; 
    }
    try {
        const response = await fetch(`${BACKEND_URL}/favorites`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const favorites = await response.json();
        if (favorites.length === 0) {
            resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">♥</div><h3>No favorites yet</h3><p>Start saving songs you love</p></div>`;
            return;
        }
        displayResults(favorites.map(f => ({ id: f.song_id, title: f.title, artist: f.artist, thumbnail: f.thumbnail })));
    } catch (error) { showToast('Failed to load favorites', 'error'); }
}

// ============================================
// PLAYLISTS
// ============================================
async function loadPlaylists() {
    if (!currentUser) { 
        showToast('Please login to see playlists', 'info'); 
        return; 
    }
    try {
        const response = await fetch(`${BACKEND_URL}/playlists`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const playlists = await response.json();
        if (playlists.length === 0) {
            resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">⊞</div><h3>No playlists yet</h3><p>Create your first playlist below</p></div>`;
            return;
        }
        resultsDiv.innerHTML = playlists.map(p => `
            <div class="video-card" onclick="viewPlaylist(${p.id})">
                <div class="info" style="padding:16px 14px;">
                    <h3 style="font-family:var(--font-display);font-size:1rem;">⊞ ${escapeHtml(p.name)}</h3>
                    <p style="color:var(--text-secondary);font-size:0.8rem;">${p.song_count || 0} tracks</p>
                    <p style="font-size:0.65rem;color:var(--text-muted);margin-top:2px;">${p.is_public ? '✦ Public' : '◈ Private'}</p>
                    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
                        <button class="btn btn-outline" onclick="event.stopPropagation();viewPlaylist(${p.id})" style="padding:3px 12px;font-size:0.7rem;flex:1;">View</button>
                        <button class="btn btn-danger" onclick="event.stopPropagation();deletePlaylist(${p.id})" style="padding:3px 12px;font-size:0.7rem;flex:1;">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (error) { showToast('Failed to load playlists', 'error'); }
}

async function createPlaylist() {
    const nameInput = document.getElementById('playlistNameInput');
    const name = nameInput ? nameInput.value.trim() : null;
    if (!name) { 
        showToast('Enter a playlist name', 'error'); 
        return; 
    }
    try {
        const response = await fetch(`${BACKEND_URL}/playlists`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ name, is_public: false })
        });
        if (response.ok) {
            showToast(`Playlist "${name}" created ✦`, 'success');
            if (nameInput) nameInput.value = '';
            loadPlaylists();
        }
    } catch (error) { showToast('Failed to create playlist', 'error'); }
}

async function deletePlaylist(id) {
    if (!confirm('Delete this playlist?')) return;
    try {
        const response = await fetch(`${BACKEND_URL}/playlists/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) { showToast('Playlist deleted', 'info'); loadPlaylists(); }
    } catch (error) { showToast('Failed to delete', 'error'); }
}

async function viewPlaylist(id) {
    try {
        const response = await fetch(`${BACKEND_URL}/playlists/${id}`);
        const playlist = await response.json();
        if (playlist.songs && playlist.songs.length > 0) {
            displayResults(playlist.songs);
        } else {
            resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">⊞</div><h3>Empty playlist</h3><p>Add some songs to get started</p></div>`;
        }
    } catch (error) { showToast('Failed to load playlist', 'error'); }
}

async function addToPlaylist(songId) {
    if (!currentUser) { 
        showToast('Sign in to add to playlists', 'error'); 
        openAuth(); 
        return; 
    }
    const playlistId = prompt('Enter playlist ID to add this song:');
    if (!playlistId) return;
    try {
        const response = await fetch(`${BACKEND_URL}/playlists/${playlistId}/songs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ song_id: songId, title: 'Song', artist: 'Artist' })
        });
        if (response.ok) showToast('Added to playlist ✦', 'success');
        else showToast('Failed to add', 'error');
    } catch (error) { showToast('Failed to add', 'error'); }
}

// ============================================
// SHARE
// ============================================
function shareSong() {
    if (!currentVideoId) { 
        showToast('No track playing', 'info'); 
        return; 
    }
    const url = `https://youtube.com/watch?v=${currentVideoId}`;
    if (navigator.share) {
        navigator.share({ 
            title: 'Check out this track on VOFO', 
            url: url 
        }).catch(() => {});
    } else {
        navigator.clipboard.writeText(url).then(() => {
            showToast('Link copied ✦', 'success');
        }).catch(() => {
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('Link copied ✦', 'success');
        });
    }
}

// ============================================
// TABS
// ============================================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
    });
    const activeTab = document.querySelector(`.tab[data-tab="${tab}"]`);
    activeTab.classList.add('active');
    activeTab.setAttribute('aria-selected', 'true');
    
    const createSection = document.getElementById('createPlaylistSection');
    if (tab === 'playlists') {
        createSection.classList.remove('hidden');
        loadPlaylists();
    } else {
        createSection.classList.add('hidden');
        if (tab === 'favorites') loadFavorites();
        else if (tab === 'trending') loadTrending();
        else resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><h3>Discover Something Beautiful</h3><p>Search for music above to begin your journey</p></div>`;
    }
}

// ============================================
// UTILITY
// ============================================
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ============================================
// KEYBOARD SHORTCUTS
// ============================================
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
    }
    if (e.key === ' ' && document.activeElement !== searchInput && document.activeElement?.tagName !== 'INPUT') {
        e.preventDefault();
        togglePlay();
    }
    if (e.key === 'Escape') {
        closeAuth();
    }
});

// ============================================
// INIT
// ============================================
function init() {
    const savedUser = localStorage.getItem('user');
    if (savedUser) { 
        try { 
            currentUser = JSON.parse(savedUser); 
            updateUI(); 
        } catch (e) {} 
    }
    searchBtn.addEventListener('click', () => searchMusic(searchInput.value));
    searchInput.addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') { 
            e.preventDefault(); 
            searchMusic(searchInput.value); 
        } 
    });
    
    setTimeout(() => loadTrending(), 500);
    
    console.log('✦ VOFO Music Experience');
    console.log('🎵 Backend: ' + BACKEND_URL);
    console.log('📱 Mode: ' + (window.innerWidth < 768 ? 'Mobile' : 'Desktop'));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
